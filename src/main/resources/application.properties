spring.application.name=shortener

# Snowflake ID generator (override with env: SNOWFLAKE_MACHINE_ID)
snowflake.machine-id=${SNOWFLAKE_MACHINE_ID:0}
# Epoch for relative encoding (fixed at 2024-01-01 in SnowflakeIdGenerator)
snowflake.epoch=2024-01-01

# PostgreSQL (override with env: SPRING_DATASOURCE_URL, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway - only scan the main migration directory, ignore h2 subdirectory
spring.flyway.locations=classpath:db/migration
