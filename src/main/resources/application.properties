spring.application.name=shortener

# Snowflake ID generator (override with env: SNOWFLAKE_MACHINE_ID)
snowflake.machine-id=${SNOWFLAKE_MACHINE_ID:0}
# Epoch for relative encoding (fixed at 2024-01-01 in SnowflakeIdGenerator)
snowflake.epoch=2024-01-01

# PostgreSQL (override with env: SPRING_DATASOURCE_URL, etc.)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shortener}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway - only scan the main migration directory, ignore h2 subdirectory
spring.flyway.locations=classpath:db/migration

# Redis (override with env: SPRING_DATA_REDIS_HOST)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# Cache TTL for URL mappings (seconds, default 24h)
cache.url-mappings.ttl=${CACHE_URL_MAPPINGS_TTL:86400}

# Shortener service (override with env: SHORTENER_BASE_URL, SHORTENER_MAX_RETRIES)
shortener.base-url=${SHORTENER_BASE_URL:http://localhost:8080}
shortener.max-retries=${SHORTENER_MAX_RETRIES:3}

# Rate limiting - anonymous shorten (global, no userId)
rate-limit.anonymous-shorten.capacity=10
rate-limit.anonymous-shorten.refill-per-second=10

# OpenAPI / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
